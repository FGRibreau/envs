name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: cargo test (macOS, no Docker)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --locked
      # macOS GitHub runners have no Docker — run only unit tests + the
      # non-Docker integration tests (it_go_compat). The Docker-dependent
      # black-box tests (it_resolve, it_coverage) run in the integration job.
      - name: cargo test (unit + doc + go_compat)
        # `--doc` cannot be combined with `--lib`/`--bins` in a single
        # invocation, so we run them as separate steps.
        run: |
          cargo test --workspace --locked --lib --bins
          cargo test --workspace --locked --doc
          cargo test --workspace --locked --test it_go_compat
        env:
          ENVS_HELPER_STUB: "1"
          ENVS_PROMPT_AUTO_GRANT: "1"
          ENVS_SKIP_REGISTRY_SYNC: "1"

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  integration-docker:
    name: integration (real vaultwarden + rbw)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install rbw + rbw-agent
        # Ubuntu runners don't have rbw via apt; cargo install is reliable.
        run: cargo install rbw --version 1.15.0 --locked
      - name: cargo test (Docker-backed black-box)
        # Each test spins up its own vaultwarden via testcontainers. They
        # serialise via #[serial_test::serial] inside a binary; the two
        # binaries run sequentially here to avoid Docker contention.
        run: |
          cargo test --workspace --locked --test it_resolve  -- --nocapture
          cargo test --workspace --locked --test it_coverage -- --nocapture
