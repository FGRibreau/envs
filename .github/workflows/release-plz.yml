name: release-plz

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'FGRibreau' }}
    environment: release
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fall back to the default GITHUB_TOKEN until the user configures
          # a Personal Access Token in the `release` environment. The release-plz
          # action below will fail visibly without RELEASE_PLZ_TOKEN — that's
          # the right signal for the bootstrap step. Without this fallback the
          # workflow fails at checkout, which is harder to debug.
          token: ${{ secrets.RELEASE_PLZ_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'FGRibreau' }}
    environment: release
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fall back to the default GITHUB_TOKEN until the user configures
          # a Personal Access Token in the `release` environment. The release-plz
          # action below will fail visibly without RELEASE_PLZ_TOKEN — that's
          # the right signal for the bootstrap step. Without this fallback the
          # workflow fails at checkout, which is harder to debug.
          token: ${{ secrets.RELEASE_PLZ_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
