<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <title>envs architecture</title>
  <desc>Four-stage flow: the envs CLI talks to the envsd daemon over a Unix domain socket; the daemon prompts the user via TouchID; on approval, secrets are fetched from Bitwarden via rbw and injected into the child process. Bottom strip names the four security pillars: least-privilege scope, ephemeral grants, HMAC audit chain, and zero plaintext on disk.</desc>
  <defs>
    <style><![CDATA[
      @media (prefers-reduced-motion: reduce) {
        animate, animateMotion, animateTransform { display: none !important }
      }
    ]]></style>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="daemonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="touchidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="cardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowIndigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A855F7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <path id="flowResolve"  d="M 235 175 L 290 175" fill="none"/>
    <path id="flowPrompt"   d="M 425 175 L 475 175" fill="none"/>
    <path id="flowFetch"    d="M 615 175 L 665 175" fill="none"/>
    <path id="flowSecrets"  d="M 670 240 C 500 280 350 280 235 240" fill="none"/>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
    <symbol id="fingerprintWhite" viewBox="0 0 36 56" overflow="visible">
      <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M22 6 C12 6 4 13 4 24 C4 28 5 32 7 36"/>
        <path d="M22 11 C14 11 9 17 9 24 C9 31 11 37 14 42"/>
        <path d="M22 16 C16 16 13 20 13 25 C13 32 16 39 20 45"/>
        <path d="M22 21 C18 21 17 23 17 27 C17 33 20 39 24 45"/>
        <path d="M28 45 C25 39 23 33 23 27"/>
      </g>
    </symbol>
  </defs>

  <!-- background -->
  <rect width="900" height="380" fill="#0F172A" rx="16"/>
  <rect width="900" height="380" fill="url(#grid)" rx="16" opacity="0.7"/>
  <path d="M0 30 L0 16 Q0 0 16 0 L30 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 30 L900 16 Q900 0 884 0 L870 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M0 350 L0 364 Q0 380 16 380 L30 380" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 350 L900 364 Q900 380 884 380 L870 380" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <!-- title -->
  <text x="450" y="36" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="1">Secrets stay encrypted until you touch the sensor</text>
  <text x="450" y="54" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Per-binary scope, per-project, time-bounded — gated by TouchID, sourced from Bitwarden</text>

  <!-- ===== Card 1: CLI ===== -->
  <g transform="translate(70, 95)">
    <rect width="160" height="160" rx="16" fill="url(#cliGrad)" filter="url(#cardGlow)"/>
    <g transform="translate(45, 22)">
      <rect x="0" y="0" width="70" height="50" rx="6" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <text x="10" y="22" fill="white" font-family="monospace" font-size="11" font-weight="700">$</text>
      <rect x="22" y="14" width="36" height="2" rx="1" fill="white" opacity="0.85">
        <animate attributeName="width" values="0;36;36" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="40" fill="white" font-family="monospace" font-size="9" opacity="0.9">flarectl</text>
      <rect x="58" y="34" width="6" height="10" fill="white" opacity="0.7">
        <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="80" y="98" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700">envs</text>
    <text x="80" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">CLI wrapper</text>
    <g transform="translate(15, 128)">
      <rect width="130" height="22" rx="11" fill="rgba(255,255,255,0.18)"/>
      <text x="65" y="15" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="600">execve(path, argv, envp)</text>
    </g>
  </g>

  <!-- ===== Card 2: daemon ===== -->
  <g transform="translate(280, 95)">
    <rect width="150" height="160" rx="16" fill="url(#daemonGrad)" filter="url(#cardGlow)"/>
    <g transform="translate(33, 22)">
      <rect x="0" y="0" width="84" height="58" rx="6" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <g>
        <circle cx="14" cy="14" r="3.5" fill="#34D399">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <text x="24" y="17" fill="white" font-family="monospace" font-size="9" font-weight="600">RULES</text>
      </g>
      <g transform="translate(0,16)">
        <circle cx="14" cy="14" r="3.5" fill="#FBBF24">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
        </circle>
        <text x="24" y="17" fill="white" font-family="monospace" font-size="9" font-weight="600">CACHE</text>
      </g>
      <g transform="translate(0,32)">
        <circle cx="14" cy="14" r="3.5" fill="#A78BFA">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite" begin="0.6s"/>
        </circle>
        <text x="24" y="17" fill="white" font-family="monospace" font-size="9" font-weight="600">AUDIT</text>
      </g>
    </g>
    <text x="75" y="105" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700">envsd</text>
    <text x="75" y="122" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">daemon</text>
    <g transform="translate(15, 132)">
      <rect width="120" height="20" rx="10" fill="rgba(255,255,255,0.18)"/>
      <text x="60" y="14" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="600">UDS · mode 0600</text>
    </g>
  </g>

  <!-- ===== Card 3: TouchID ===== -->
  <g transform="translate(470, 95)">
    <rect width="150" height="160" rx="16" fill="url(#touchidGrad)" filter="url(#cardGlow)"/>
    <g transform="translate(57, 18)">
      <use href="#fingerprintWhite" width="36" height="56"/>
    </g>
    <text x="75" y="105" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700">TouchID</text>
    <text x="75" y="122" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">human-in-the-loop</text>
    <g transform="translate(15, 132)">
      <rect width="120" height="20" rx="10" fill="rgba(255,255,255,0.22)"/>
      <text x="60" y="14" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="600">scope · ttl · save</text>
    </g>
  </g>

  <!-- ===== Card 4: vault ===== -->
  <g transform="translate(660, 95)">
    <rect width="170" height="160" rx="16" fill="url(#vaultGrad)" filter="url(#cardGlow)"/>
    <g transform="translate(58, 22)">
      <path d="M26 0 L52 8 L52 30 C52 44 39 54 26 58 C13 54 0 44 0 30 L0 8 Z" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <rect x="16" y="26" width="20" height="16" rx="3" fill="white"/>
      <path d="M20 26 L20 20 C20 14 32 14 32 20 L32 26" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="26" cy="32" r="2" fill="#7C3AED"/>
      <rect x="25" y="33" width="2" height="5" fill="#7C3AED"/>
    </g>
    <text x="85" y="105" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700">Bitwarden</text>
    <text x="85" y="122" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">vault · encrypted at rest</text>
    <g transform="translate(20, 132)">
      <rect width="130" height="20" rx="10" fill="rgba(255,255,255,0.18)"/>
      <text x="65" y="14" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="600">rbw://item/field</text>
    </g>
  </g>

  <!-- arrows -->
  <g>
    <path d="M 230 175 L 285 175" fill="none" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrowIndigo)"/>
    <circle r="4" fill="#6366F1" filter="url(#softGlow)">
      <animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#flowResolve"/></animateMotion>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="257" y="166" text-anchor="middle" fill="#A5B4FC" font-family="monospace" font-size="9" font-weight="600">resolve</text>
  </g>
  <g>
    <path d="M 430 175 L 465 175" fill="none" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
    <circle r="4" fill="#F59E0B" filter="url(#softGlow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.4s"><mpath href="#flowPrompt"/></animateMotion>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <text x="447" y="166" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9" font-weight="600">prompt</text>
  </g>
  <g>
    <path d="M 620 175 L 655 175" fill="none" stroke="#A855F7" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
    <circle r="4" fill="#A855F7" filter="url(#softGlow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s"><mpath href="#flowFetch"/></animateMotion>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <text x="637" y="166" text-anchor="middle" fill="#D8B4FE" font-family="monospace" font-size="9" font-weight="600">rbw get</text>
  </g>
  <g>
    <path d="M 670 240 C 500 280 350 280 235 240" fill="none" stroke="#10B981" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)" opacity="0.85">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#10B981" filter="url(#softGlow)">
      <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.2s"><mpath href="#flowSecrets"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <text x="450" y="278" text-anchor="middle" fill="#34D399" font-family="monospace" font-size="9" font-weight="600">secrets injected → child process exec()</text>
  </g>

  <!-- bottom info bar (tightened: 4 chips of equal width, no pulse, AA contrast) -->
  <g transform="translate(0, 308)">
    <rect x="50" y="0" width="800" height="55" rx="12" fill="#1E293B" opacity="0.7"/>
    <g transform="translate(70, 10)">
      <rect width="185" height="35" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1"/>
      <text x="92" y="16" text-anchor="middle" fill="#10B981" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Least-privilege</text>
      <text x="92" y="29" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">per-binary · per-project</text>
    </g>
    <g transform="translate(265, 10)">
      <rect width="185" height="35" rx="8" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1"/>
      <text x="92" y="16" text-anchor="middle" fill="#F59E0B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Ephemeral</text>
      <text x="92" y="29" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">1m · 5m · 30m · 1h</text>
    </g>
    <g transform="translate(460, 10)">
      <rect width="185" height="35" rx="8" fill="rgba(99,102,241,0.15)" stroke="#6366F1" stroke-width="1"/>
      <text x="92" y="16" text-anchor="middle" fill="#A5B4FC" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Audit chain</text>
      <text x="92" y="29" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">HMAC-SHA256 · tamper-evident</text>
    </g>
    <g transform="translate(655, 10)">
      <rect width="195" height="35" rx="8" fill="rgba(168,85,247,0.15)" stroke="#A855F7" stroke-width="1"/>
      <text x="97" y="16" text-anchor="middle" fill="#A855F7" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Zero plaintext on disk</text>
      <text x="97" y="29" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">no .env · no .envrc · no creds</text>
    </g>
  </g>
</svg>
