<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="laptopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="exfilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#EF4444" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
    <path id="exfilPath" d="M 540 200 C 640 200 720 200 800 200" fill="none"/>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="380" fill="#0F172A" rx="16"/>
  <rect width="900" height="380" fill="url(#grid)" rx="16" opacity="0.7"/>
  <path d="M0 30 L0 16 Q0 0 16 0 L30 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 30 L900 16 Q900 0 884 0 L870 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M0 350 L0 364 Q0 380 16 380 L30 380" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 350 L900 364 Q900 380 884 380 L870 380" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <!-- TITLE -->
  <text x="450" y="32" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" letter-spacing="1">Same UID, same blast radius</text>
  <text x="450" y="50" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">every agent and every transitive dep runs as you — and reads everything you can read</text>

  <!-- ==================== LAPTOP (LEFT) ==================== -->
  <g transform="translate(60, 90)" filter="url(#cardGlow)">
    <!-- screen -->
    <rect width="380" height="220" rx="12" fill="url(#laptopGrad)" stroke="#334155" stroke-width="1"/>
    <!-- top bar -->
    <rect width="380" height="22" rx="12" fill="#0B1322"/>
    <rect y="10" width="380" height="12" fill="#0B1322"/>
    <circle cx="14" cy="11" r="4" fill="#475569"/>
    <circle cx="28" cy="11" r="4" fill="#475569"/>
    <circle cx="42" cy="11" r="4" fill="#475569"/>
    <text x="190" y="15" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">~/  · same UID = anything you can read, they can read</text>

    <!-- AGENT PROCESSES (4) — each with a scanning sweep -->
    <g transform="translate(20, 38)">
      <rect width="82" height="34" rx="6" fill="rgba(239,68,68,0.12)" stroke="#EF4444" stroke-width="1"/>
      <circle cx="13" cy="17" r="5" fill="#EF4444">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="48" y="14" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="9" font-weight="600">agent</text>
      <text x="48" y="25" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="8">postinstall</text>
    </g>
    <g transform="translate(108, 38)">
      <rect width="82" height="34" rx="6" fill="rgba(239,68,68,0.12)" stroke="#EF4444" stroke-width="1"/>
      <circle cx="13" cy="17" r="5" fill="#EF4444">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <text x="48" y="14" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="9" font-weight="600">copilot</text>
      <text x="48" y="25" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="8">shell-tool</text>
    </g>
    <g transform="translate(196, 38)">
      <rect width="82" height="34" rx="6" fill="rgba(239,68,68,0.12)" stroke="#EF4444" stroke-width="1"/>
      <circle cx="13" cy="17" r="5" fill="#EF4444">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
      <text x="48" y="14" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="9" font-weight="600">mcp</text>
      <text x="48" y="25" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="8">server</text>
    </g>
    <g transform="translate(284, 38)">
      <rect width="82" height="34" rx="6" fill="rgba(239,68,68,0.12)" stroke="#EF4444" stroke-width="1"/>
      <circle cx="13" cy="17" r="5" fill="#EF4444">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <text x="48" y="14" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="9" font-weight="600">npx</text>
      <text x="48" y="25" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="8">transitive</text>
    </g>

    <!-- SCAN SWEEP across the file rows -->
    <line x1="22" y1="86" x2="358" y2="86" stroke="#EF4444" stroke-width="1.5" opacity="0">
      <animate attributeName="y1" values="86;200;86" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="86;200;86" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0" dur="3.2s" repeatCount="indefinite"/>
    </line>

    <!-- DOTFILE ROWS (target files) -->
    <g transform="translate(20, 92)" font-family="monospace" font-size="10">
      <rect width="340" height="20" rx="4" fill="#0B1322"/>
      <text x="10" y="14" fill="#94A3B8">~/.envrc</text>
      <text x="180" y="14" fill="#475569">CF_API_TOKEN=cf-prod-aaaaaaaa…</text>
      <circle cx="328" cy="10" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
    </g>
    <g transform="translate(20, 116)" font-family="monospace" font-size="10">
      <rect width="340" height="20" rx="4" fill="#0B1322"/>
      <text x="10" y="14" fill="#94A3B8">~/.aws/credentials</text>
      <text x="180" y="14" fill="#475569">AKIA… secret_access_key=…</text>
      <circle cx="328" cy="10" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
    </g>
    <g transform="translate(20, 140)" font-family="monospace" font-size="10">
      <rect width="340" height="20" rx="4" fill="#0B1322"/>
      <text x="10" y="14" fill="#94A3B8">~/projects/.env.production</text>
      <text x="180" y="14" fill="#475569">DATABASE_URL=postgres://…</text>
      <circle cx="328" cy="10" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
    </g>
    <g transform="translate(20, 164)" font-family="monospace" font-size="10">
      <rect width="340" height="20" rx="4" fill="#0B1322"/>
      <text x="10" y="14" fill="#94A3B8">$ printenv</text>
      <text x="180" y="14" fill="#475569">STRIPE_SECRET=sk_live_…</text>
      <circle cx="328" cy="10" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="1.1s"/>
      </circle>
    </g>
    <g transform="translate(20, 188)" font-family="monospace" font-size="10">
      <rect width="340" height="20" rx="4" fill="#0B1322"/>
      <text x="10" y="14" fill="#94A3B8">find ~ -name '*.env*'</text>
      <text x="180" y="14" fill="#475569">…128 hits</text>
      <circle cx="328" cy="10" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="1.4s"/>
      </circle>
    </g>
  </g>

  <!-- ==================== EXFILTRATION ARROW (RIGHT) ==================== -->
  <path d="M 460 200 L 800 200" stroke="url(#exfilGrad)" stroke-width="3" fill="none"/>
  <path d="M 460 200 L 800 200" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M 795 195 L 805 200 L 795 205" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- exfil packets -->
  <circle r="4" fill="#EF4444" filter="url(#softGlow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0s">
      <mpath href="#exfilPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#EF4444" filter="url(#softGlow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#exfilPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <text x="630" y="190" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="10" font-weight="600">curl | nc | dns-tunnel</text>
  <text x="630" y="222" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">any HTTP client already on PATH</text>

  <!-- ==================== ATTACKER CLOUD (FAR RIGHT) ==================== -->
  <g transform="translate(800, 170)">
    <path d="M 8 30 C 0 30 0 18 8 18 C 8 8 22 8 22 18 C 30 12 42 18 42 26 C 50 26 50 38 42 38 C 42 44 22 44 22 38 L 8 38 C 0 38 0 30 8 30 Z" fill="rgba(239,68,68,0.2)" stroke="#EF4444" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <text x="25" y="60" text-anchor="middle" fill="#FCA5A5" font-family="monospace" font-size="9" font-weight="600">attacker</text>
    <text x="25" y="72" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="8">.example</text>
  </g>

  <!-- ==================== BOTTOM CAPTION ==================== -->
  <g transform="translate(0, 330)">
    <rect x="50" y="0" width="800" height="35" rx="10" fill="#1E293B" opacity="0.7"/>
    <text x="450" y="14" text-anchor="middle" fill="#FCA5A5" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">event-stream · ua-parser-js · xz-utils · shai-hulud</text>
    <text x="450" y="28" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">none of those compromised dependencies needed root — your secrets were already plaintext on disk, readable to every process you launched</text>
  </g>
</svg>
