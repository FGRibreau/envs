<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <title>Each grant lives in a tiny three-axis box</title>
  <desc>Each envs grant is a small green cube bounded on three axes — binary path (where), env-var subset (what), and TTL of 1m, 5m, 30m, or 1h (how long) — nested inside the unbounded direnv baseline drawn as a faint dashed wireframe. A countdown bar shows the grant expiring automatically.</desc>
  <defs>
    <style><![CDATA[
      @media (prefers-reduced-motion: reduce) {
        animate, animateMotion, animateTransform { display: none !important }
      }
    ]]></style>
    <linearGradient id="grantedFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="grantedFaceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="grantedFaceSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="360" fill="#0F172A" rx="16"/>
  <rect width="900" height="360" fill="url(#grid)" rx="16" opacity="0.7"/>
  <path d="M0 30 L0 16 Q0 0 16 0 L30 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 30 L900 16 Q900 0 884 0 L870 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M0 330 L0 344 Q0 360 16 360 L30 360" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 330 L900 344 Q900 360 884 360 L870 360" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <text x="450" y="32" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" letter-spacing="1">Each grant lives in a tiny three-axis box</text>
  <text x="450" y="50" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">least-privilege + just-in-time, applied to a developer laptop</text>

  <!-- direnv outer wireframe (consistent isometric: bottom 0,180 → 240,180 → 320,140 → 80,140) -->
  <g transform="translate(140, 90)" opacity="0.45">
    <!-- bottom face (dashed) -->
    <polygon points="0,180 240,180 320,140 80,140" fill="none" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- front face -->
    <polygon points="0,180 240,180 240,40 0,40" fill="none" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- right face -->
    <polygon points="240,180 320,140 320,0 240,40" fill="none" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- top face (visible top edges only) -->
    <polygon points="0,40 240,40 320,0 80,0" fill="none" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <text x="170" y="313" fill="#FCA5A5" font-family="monospace" font-size="10" font-weight="600">✗ direnv: any binary · all vars · forever</text>

  <!-- envs grant: small solid cube nested inside the wireframe -->
  <g transform="translate(140, 90)">
    <!-- Front face -->
    <polygon points="20,180 20,140 90,140 90,180" fill="url(#grantedFace)" stroke="#10B981" stroke-width="1.5"/>
    <!-- Top face -->
    <polygon points="20,140 50,120 120,120 90,140" fill="url(#grantedFaceTop)" stroke="#10B981" stroke-width="1.5"/>
    <!-- Right face -->
    <polygon points="90,180 90,140 120,120 120,160" fill="url(#grantedFaceSide)" stroke="#10B981" stroke-width="1.5"/>
    <text x="55" y="166" text-anchor="middle" fill="white" font-family="monospace" font-size="9" font-weight="700">flarectl</text>
    <text x="55" y="178" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-family="monospace" font-size="8">CF_API_TOKEN</text>
  </g>

  <!-- TTL countdown bar inside the cube -->
  <g transform="translate(360, 195)">
    <rect width="80" height="6" rx="3" fill="#0B1322" stroke="#F59E0B" stroke-width="1" opacity="0.7"/>
    <rect width="80" height="6" rx="3" fill="#F59E0B">
      <animate attributeName="width" values="80;0;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="-4" text-anchor="middle" fill="#FCD34D" font-family="monospace" font-size="9" font-weight="600">5:00 → 0:00</text>
  </g>

  <!-- Right-side explainer panels (cube alone is too abstract; panels carry the semantics) -->
  <g transform="translate(530, 100)">
    <rect width="320" height="62" rx="10" fill="rgba(99,102,241,0.10)" stroke="#6366F1" stroke-width="1"/>
    <text x="20" y="22" fill="#A5B4FC" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">Where</text>
    <text x="20" y="40" fill="#E2E8F0" font-family="monospace" font-size="10">/opt/homebrew/bin/flarectl</text>
    <text x="20" y="54" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">inside ~/www/image-charts/ — detected via .envs/</text>
  </g>
  <g transform="translate(530, 175)">
    <rect width="320" height="62" rx="10" fill="rgba(168,85,247,0.10)" stroke="#A855F7" stroke-width="1"/>
    <text x="20" y="22" fill="#D8B4FE" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">What</text>
    <text x="20" y="40" fill="#E2E8F0" font-family="monospace" font-size="10">CF_API_TOKEN, CF_ACCOUNT_ID</text>
    <text x="20" y="54" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">a chosen subset of the vault, never the whole thing</text>
  </g>
  <g transform="translate(530, 250)">
    <rect width="320" height="62" rx="10" fill="rgba(245,158,11,0.10)" stroke="#F59E0B" stroke-width="1"/>
    <text x="20" y="22" fill="#FCD34D" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">How long</text>
    <text x="20" y="40" fill="#E2E8F0" font-family="monospace" font-size="10">1 min · 5 min · 30 min · 1 hour</text>
    <text x="20" y="54" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10">grant expires automatically — TouchID again, or nothing</text>
  </g>
</svg>
