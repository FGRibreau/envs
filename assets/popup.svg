<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <title>envs authorization popup</title>
  <desc>Native macOS authorization dialog. Path and project rows show what is being run; checkboxes pick which environment variables to inject from the Bitwarden vault, with rbw:// pointers shown next to each. Three dropdowns set scope, duration, and where to save the resulting profile. The Authorize via TouchID button is the only path that releases the secrets.</desc>
  <defs>
    <style><![CDATA[
      @media (prefers-reduced-motion: reduce) {
        animate, animateMotion, animateTransform { display: none !important }
      }
    ]]></style>
    <linearGradient id="popupCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F1B2E"/>
    </linearGradient>
    <linearGradient id="touchidBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="440" fill="#0F172A" rx="16"/>
  <rect width="900" height="440" fill="url(#grid)" rx="16" opacity="0.7"/>
  <path d="M0 30 L0 16 Q0 0 16 0 L30 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 30 L900 16 Q900 0 884 0 L870 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M0 410 L0 424 Q0 440 16 440 L30 440" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 410 L900 424 Q900 440 884 440 L870 440" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <!-- terminal context (top-left) -->
  <g transform="translate(60, 40)">
    <rect width="290" height="78" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="16" cy="16" r="5" fill="#EF4444"/>
    <circle cx="32" cy="16" r="5" fill="#F59E0B"/>
    <circle cx="48" cy="16" r="5" fill="#10B981"/>
    <text x="145" y="20" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">Terminal — zsh</text>
    <text x="14" y="44" fill="#A5B4FC" font-family="monospace" font-size="11">$ </text>
    <text x="28" y="44" fill="#E2E8F0" font-family="monospace" font-size="11">cd ~/www/image-charts</text>
    <text x="14" y="62" fill="#A5B4FC" font-family="monospace" font-size="11">$ </text>
    <text x="28" y="62" fill="#E2E8F0" font-family="monospace" font-size="11">envs flarectl zone list</text>
    <rect x="220" y="54" width="6" height="10" fill="#10B981">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- popup -->
  <g transform="translate(220, 60)" filter="url(#cardGlow)">
    <rect width="460" height="350" rx="14" fill="url(#popupCard)" stroke="#334155" stroke-width="1"/>
    <rect width="460" height="38" rx="14" fill="#0B1322"/>
    <rect y="26" width="460" height="12" fill="#0B1322"/>
    <circle cx="18" cy="19" r="6" fill="#EF4444"/>
    <circle cx="38" cy="19" r="6" fill="#F59E0B"/>
    <circle cx="58" cy="19" r="6" fill="#10B981"/>
    <text x="230" y="23" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">envs — authorize secret access?</text>

    <g transform="translate(28, 60)">
      <text x="0" y="14" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Path</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#6366F1" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="monospace" font-size="11">/opt/homebrew/bin/flarectl</text>
      </g>
    </g>
    <g transform="translate(28, 92)">
      <text x="0" y="14" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Project</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#A855F7" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="monospace" font-size="11">~/www/image-charts</text>
      </g>
    </g>

    <text x="28" y="140" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Inject env vars</text>

    <g transform="translate(28, 152)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#10B981"/>
      <path d="M 3 7 L 6 10 L 11 4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="11" fill="#E2E8F0" font-family="monospace" font-size="11">CF_API_TOKEN</text>
      <text x="135" y="11" fill="#94A3B8" font-family="monospace" font-size="11">←</text>
      <g transform="translate(155, -3)">
        <rect width="245" height="18" rx="9" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
        <circle cx="10" cy="9" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <text x="20" y="13" fill="#FCD34D" font-family="monospace" font-size="10">rbw://Cloudflare/CF_API_TOKEN</text>
      </g>
    </g>

    <g transform="translate(28, 178)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#10B981"/>
      <path d="M 3 7 L 6 10 L 11 4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="11" fill="#E2E8F0" font-family="monospace" font-size="11">CF_ACCOUNT_ID</text>
      <text x="135" y="11" fill="#94A3B8" font-family="monospace" font-size="11">←</text>
      <g transform="translate(155, -3)">
        <rect width="245" height="18" rx="9" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
        <circle cx="10" cy="9" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
        </circle>
        <text x="20" y="13" fill="#FCD34D" font-family="monospace" font-size="10">rbw://Cloudflare/CF_ACCOUNT_ID</text>
      </g>
    </g>

    <g transform="translate(28, 212)">
      <text x="0" y="14" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Scope</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Any flarectl in image-charts</text>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="translate(28, 240)">
      <text x="0" y="14" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Duration</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">5 minutes</text>
        <circle cx="92" cy="11" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="translate(28, 268)">
      <text x="0" y="14" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Save as</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Project (.envs/flarectl.toml)</text>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Buttons centered: total width 80 + 14 + 170 = 264 → start x=(460-264)/2=98 -->
    <g transform="translate(98, 304)">
      <rect width="80" height="32" rx="8" fill="none" stroke="#475569" stroke-width="1"/>
      <text x="40" y="20" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Cancel</text>
    </g>
    <g transform="translate(192, 304)">
      <rect width="170" height="32" rx="8" fill="url(#touchidBtn)"/>
      <g transform="translate(14, 6)">
        <use href="#fingerprintWhite" width="14" height="20"/>
      </g>
      <text x="98" y="20" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Authorize via TouchID</text>
    </g>
  </g>

  <!-- shared fingerprint symbol (used inside the button) -->
  <symbol id="fingerprintWhite" viewBox="0 0 36 56" overflow="visible">
    <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M22 6 C12 6 4 13 4 24 C4 28 5 32 7 36"/>
      <path d="M22 11 C14 11 9 17 9 24 C9 31 11 37 14 42"/>
      <path d="M22 16 C16 16 13 20 13 25 C13 32 16 39 20 45"/>
      <path d="M22 21 C18 21 17 23 17 27 C17 33 20 39 24 45"/>
      <path d="M28 45 C25 39 23 33 23 27"/>
    </g>
  </symbol>

  <!-- caption -->
  <text x="450" y="427" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">
    Decision cached for the duration you chose · subsequent calls skip the popup · expires automatically
  </text>
</svg>
