<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <defs>
    <!-- Gradients -->
    <linearGradient id="popupCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F1B2E"/>
    </linearGradient>
    <linearGradient id="touchidBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Filters -->
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Animated path: popup → terminal -->
    <path id="popupToTerm" d="M 580 350 C 660 410 720 410 760 380" fill="none"/>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="900" height="460" fill="#0F172A" rx="16"/>
  <rect width="900" height="460" fill="url(#grid)" rx="16" opacity="0.7"/>
  <path d="M0 30 L0 16 Q0 0 16 0 L30 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 30 L900 16 Q900 0 884 0 L870 0" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M0 430 L0 444 Q0 460 16 460 L30 460" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
  <path d="M900 430 L900 444 Q900 460 884 460 L870 460" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <!-- ==================== TERMINAL CARD (TOP-LEFT) ==================== -->
  <g transform="translate(40, 40)" filter="url(#cardGlow)">
    <rect width="280" height="78" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <!-- traffic lights -->
    <circle cx="16" cy="16" r="5" fill="#475569"/>
    <circle cx="32" cy="16" r="5" fill="#475569"/>
    <circle cx="48" cy="16" r="5" fill="#475569"/>
    <text x="140" y="20" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">Terminal — zsh</text>
    <!-- prompt lines -->
    <text x="14" y="44" fill="#A5B4FC" font-family="monospace" font-size="11">$ </text>
    <text x="28" y="44" fill="#E2E8F0" font-family="monospace" font-size="11">cd ~/www/image-charts</text>
    <text x="14" y="62" fill="#A5B4FC" font-family="monospace" font-size="11">$ </text>
    <text x="28" y="62" fill="#E2E8F0" font-family="monospace" font-size="11">envs flarectl zone list</text>
    <rect x="220" y="54" width="6" height="10" fill="#10B981">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- arrow from terminal down-right into popup -->
  <path d="M 200 130 C 240 160 280 175 330 175" fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="4,3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.4s" repeatCount="indefinite"/>
  </path>

  <!-- ==================== AUTHORIZATION POPUP (CENTER) ==================== -->
  <g transform="translate(220, 60)" filter="url(#cardGlow)">
    <!-- panel -->
    <rect width="460" height="340" rx="14" fill="url(#popupCard)" stroke="#334155" stroke-width="1"/>
    <!-- title bar -->
    <rect width="460" height="38" rx="14" fill="#0B1322"/>
    <rect y="26" width="460" height="12" fill="#0B1322"/>
    <!-- traffic lights -->
    <circle cx="18" cy="19" r="6" fill="#EF4444"/>
    <circle cx="38" cy="19" r="6" fill="#F59E0B"/>
    <circle cx="58" cy="19" r="6" fill="#10B981"/>
    <text x="230" y="23" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">envs — authorize secret access?</text>

    <!-- Command + Project rows -->
    <g transform="translate(28, 58)">
      <text x="0" y="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Command</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#6366F1" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="monospace" font-size="11">flarectl zone list</text>
      </g>
    </g>
    <g transform="translate(28, 90)">
      <text x="0" y="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Project</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#A855F7" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="monospace" font-size="11">~/www/image-charts</text>
      </g>
    </g>

    <!-- Inject env vars: header -->
    <text x="28" y="138" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Inject env vars</text>

    <!-- Row 1 -->
    <g transform="translate(28, 148)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#10B981"/>
      <path d="M 3 7 L 6 10 L 11 4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,12;12,0" dur="0.4s" begin="0.2s" fill="freeze"/>
      </path>
      <text x="22" y="11" fill="#E2E8F0" font-family="monospace" font-size="11">CF_API_TOKEN</text>
      <text x="135" y="11" fill="#475569" font-family="monospace" font-size="11">←</text>
      <g transform="translate(155, -3)">
        <rect width="245" height="18" rx="9" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
        <circle cx="10" cy="9" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <text x="20" y="13" fill="#FCD34D" font-family="monospace" font-size="10">rbw://Cloudflare/CF_API_TOKEN</text>
      </g>
    </g>

    <!-- Row 2 -->
    <g transform="translate(28, 174)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#10B981"/>
      <path d="M 3 7 L 6 10 L 11 4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,12;12,0" dur="0.4s" begin="0.45s" fill="freeze"/>
      </path>
      <text x="22" y="11" fill="#E2E8F0" font-family="monospace" font-size="11">CF_ACCOUNT_ID</text>
      <text x="135" y="11" fill="#475569" font-family="monospace" font-size="11">←</text>
      <g transform="translate(155, -3)">
        <rect width="245" height="18" rx="9" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
        <circle cx="10" cy="9" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
        </circle>
        <text x="20" y="13" fill="#FCD34D" font-family="monospace" font-size="10">rbw://Cloudflare/CF_ACCOUNT_ID</text>
      </g>
    </g>

    <!-- Dropdowns -->
    <g transform="translate(28, 206)">
      <text x="0" y="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Scope</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Any flarectl in image-charts</text>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="translate(28, 234)">
      <text x="0" y="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Duration</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">5 minutes</text>
        <circle cx="92" cy="11" r="3" fill="#F59E0B">
          <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
    <g transform="translate(28, 262)">
      <text x="0" y="13" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Save as</text>
      <g transform="translate(80, 0)">
        <rect width="320" height="22" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
        <text x="12" y="15" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Project profile (.envs/flarectl.toml)</text>
        <path d="M 304 9 L 309 14 L 314 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Buttons -->
    <g transform="translate(220, 296)">
      <!-- Cancel -->
      <rect width="80" height="30" rx="8" fill="none" stroke="#475569" stroke-width="1"/>
      <text x="40" y="19" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">Cancel</text>
    </g>
    <g transform="translate(310, 296)">
      <!-- TouchID button -->
      <rect width="130" height="30" rx="8" fill="url(#touchidBtn)"/>
      <!-- pulsing fingerprint -->
      <g transform="translate(10, 6)" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round">
        <path d="M9 3 C5 3 2 6 2 10 C2 12 2.5 14 3.5 16">
          <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.4s" repeatCount="indefinite"/>
        </path>
        <path d="M9 6 C6 6 4 8 4 11 C4 14 5 16 6 18">
          <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
        </path>
        <path d="M9 9 C7 9 6 10 6 12 C6 15 7 17 9 19">
          <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite" begin="0.3s"/>
        </path>
        <path d="M12 19 C10 16 9 13 9 11">
          <animate attributeName="stroke-opacity" values="0.85;1;0.85" dur="1.4s" repeatCount="indefinite" begin="0.45s"/>
        </path>
      </g>
      <text x="78" y="19" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Authorize</text>
    </g>
  </g>

  <!-- ==================== DOTTED PATH (popup → child terminal) ==================== -->
  <path d="M 580 350 C 660 410 720 410 760 380" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5,4" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <!-- secret particles -->
  <circle r="5" fill="#10B981" filter="url(#softGlow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.4s">
      <mpath href="#popupToTerm"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="5" fill="#10B981" filter="url(#softGlow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="1.2s">
      <mpath href="#popupToTerm"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- ==================== CHILD TERMINAL (BOTTOM-RIGHT) ==================== -->
  <g transform="translate(700, 320)" filter="url(#cardGlow)">
    <rect width="180" height="100" rx="10" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
    <!-- traffic lights -->
    <circle cx="14" cy="14" r="4" fill="#475569"/>
    <circle cx="26" cy="14" r="4" fill="#475569"/>
    <circle cx="38" cy="14" r="4" fill="#475569"/>
    <text x="90" y="17" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9">flarectl (child)</text>

    <text x="12" y="42" fill="#10B981" font-family="monospace" font-size="10">CF_API_TOKEN</text>
    <text x="100" y="42" fill="#10B981" font-family="monospace" font-size="10">✓</text>
    <text x="12" y="58" fill="#10B981" font-family="monospace" font-size="10">CF_ACCOUNT_ID</text>
    <text x="100" y="58" fill="#10B981" font-family="monospace" font-size="10">✓</text>

    <text x="12" y="80" fill="#A5B4FC" font-family="monospace" font-size="10">$ </text>
    <text x="24" y="80" fill="#E2E8F0" font-family="monospace" font-size="10">flarectl zone list</text>
    <rect x="12" y="86" width="6" height="8" fill="#10B981">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ==================== CAPTION ==================== -->
  <text x="450" y="445" text-anchor="middle" fill="#64748B" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11">
    Decision cached for 5 min · subsequent calls skip the popup · expires automatically
  </text>
</svg>
