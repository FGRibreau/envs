name: envs-integration

# Black-box integration test: vaultwarden + rbw + envs end-to-end.
#
#   envs (CLI under test, Linux build)  →  rbw (1.15)  →  vaultwarden (Bitwarden API)
#
# The macOS-only bits (TouchID, AppKit popup, LaunchAgent) are stubbed via the
# helper-stub mode (`ENVS_HELPER_STUB=1`); everything else (resolve flow, value
# cache, audit chain, auto-lock/unlock) runs against a real vault.

services:
  vaultwarden:
    image: vaultwarden/server:1.35.8-alpine
    environment:
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "80"
      DOMAIN: "http://vaultwarden"
      SIGNUPS_ALLOWED: "true"
      DISABLE_ICON_DOWNLOAD: "true"
      INVITATIONS_ALLOWED: "false"
      WEB_VAULT_ENABLED: "false"
      LOG_LEVEL: "info"
      I_REALLY_WANT_VOLATILE_STORAGE: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/alive"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 8s

  envs-test:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
    depends_on:
      vaultwarden:
        condition: service_healthy
    environment:
      VAULTWARDEN_URL: "http://vaultwarden"
      RBW_EMAIL: "tester@envs.local"
      RBW_PASSWORD: "test-master-password-123"
      ENVS_NONINTERACTIVE_OK: "1"
    command: ["/integration/run-tests.sh"]
